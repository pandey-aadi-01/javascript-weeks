<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    body {
  margin: 0;
  background: #0d1117;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}
    .header {
      width: 1200px;
      gap: 50px;
      margin: auto;
      /* display: grid;
      grid-template-columns: 1fr 2fr; */
      display: flex;
      /* gap: 200px; */
    }

    .left-center {
        background: #0d1117;
        color: #ffffff;
        flex: 1;


    }
.right {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
    background: #0d1117;
     color: #ffffff;
     flex: 2;

}

.img-of-language {
  display: flex;
  align-items: center;
  gap: 10px;
}

.img-of-language img {
  width: 20px;
  height: 20px;
}

.v-text {
  font-size: 14px;
}
p{
  color: #c9d1d9;
  font-size: 14px;
}
  </style>

</head>

<body>
  <div class="header">

    <div class="container">
      <div class="left-center">
        <div class="left">
          <h2>Code in any language</h2>
        </div>
        <p>
        VS Code supports almost every major <br> programming language. Several ship in the box,<br> like JavaScript, TypeScript, CSS, and
        HTML, but <br>extensions for others can be found in the VS <br> Code Marketplace.
        </p>

      </div>
    </div>



    <div class="right">

      <div class="img-of-language">
        <img src="language-js.png">
        <span class="v-text">JavaScript</span>
      </div>

      <div class="img-of-language">
        <img src="language-ts.png">
        <span class="v-text">TypeScript</span>
      </div>

      <div class="img-of-language">
        <img src="language-python.png">
        <span class="v-text">Python</span>
      </div>

      <div class="img-of-language">
        <img src="language-cpp.png">
        <span class="v-text">C++</span>
      </div>

      <div class="img-of-language">
        <img src="language-java.png">
        <span class="v-text">Java</span>
      </div>

      <div class="img-of-language">
        <img src="language-html.png">
        <span class="v-text">HTML</span>
      </div>

      <div class="img-of-language">
        <img src="language-markdown.png">
        <span class="v-text">Markdown</span>
      </div>

      <div class="img-of-language">
        <img src="language-powershell.png">
        <span class="v-text">PowerShell</span>
      </div>

      <div class="img-of-language">
        <img src="language-json.png">
        <span class="v-text">JSON</span>
      </div>

    </div>




  </div>
  </div>

</body>

</html>
