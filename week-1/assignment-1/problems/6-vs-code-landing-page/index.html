<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header>
    <div class="navbar">
      <div class="a-tags">
        <div class="vs-logo">
          <img src="favicon.ico" alt="logo" />
        </div>
      </div>
      <h3>Visual Studio Code</h3>
      <div class="navbar-links">
        <a class="navLink" href="#">Docs</a>
        <a class="navLink" href="#">Updates</a>
        <a class="navLink" href="#">Blog</a>
        <a class="navLink" href="#">API</a>
        <a class="navLink" href="#">Extensions</a>
        <a class="navLink" href="#">MCP</a>
        <a class="navLink" href="#">FAQ</a>
        <a class="navLink" href="#">Learn</a>
        <a class="navLink" href="#">Events</a>
      </div>
      <div class="download-section">
        <div class="srch-btn">
          <input type="text" placeholder="Search" class="srch-placeholder" />
          <span class="v-btn">Ctrl+Shift+P</span>
        </div>

        <img src="theme-light.svg" alt="light-theme" class="theme-light" />
        <button class="dwn-btn">Download</button>
      </div>
    </div>
  </header>
  <div class="main-content">
    <h1 class="h-tag">The open source AI code editor</h1>
    <p class="sec-line">Your home for multi-agent development</p>

    <div class="dwl-section">
      <button>Download for Windows</button>
    </div>
    <div class="a-links">
      <a class="nav-a" href="">Web</a>
      <a class="nav-a" href="">Insiders edition,</a>
      <span>or</span>
      <a class="nav-a" href="">Other platforms</a>
    </div>
  </div>
</body>

</html>
