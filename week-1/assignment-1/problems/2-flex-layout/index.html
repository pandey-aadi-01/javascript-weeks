<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    .container {
      display: flex;
      width: 1200px;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0 auto;
    }

    .left {
      background-color: red;
      flex: 1;
    }

    .right {
      background-color: blue;
      flex: 2;
    }
  </style>

</head>

<body>
  <div class="container">
    <div class="left">
      <h3>left</h3>
    </div>

    <div class="right">
      <h3>right</h3>
    </div>

</body>

</html>
